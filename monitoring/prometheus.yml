global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "order-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["order-service:8001"]
        labels:
          service: "order-service"

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9092"]
        labels:
          service: "kafka-broker"
